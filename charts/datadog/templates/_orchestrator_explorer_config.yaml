{{- define "orchestratorExplorer-add-custom-orchestrator-explorer-config" -}}
{{- $useCRDConfig := true -}}

{{/*
If custom config is provided in `clusterAgent.confd`, then we don't add crd collection config.
*/}}
{{- range $k, $v := .Values.clusterAgent.confd -}}
{{- if or (eq "orchestrator.yaml" $k) (eq "orchestrator.yaml.default" $k)  -}}
{{- $useCRDConfig = false -}}
{{- end -}}
{{- end -}}

{{/*
If custom config is provided in `clusterAgent.advancedConfd`, then we don't add crd collection config.
*/}}
{{- range $integration, $configs := .Values.clusterAgent.advancedConfd -}}
{{- if and (eq "orchestrator.d" $integration) (gt (len $configs) 0) -}}
{{- $useCRDConfig = false -}}
{{- end -}}
{{- end -}}

{{/*
If customResources is empty and not using cluster check runners, then we don't add config.
*/}}
{{- if eq $useCRDConfig true  -}}
{{- if and (eq (len (include "orchestratorExplorer-custom-resources" . | fromYamlArray)) 0) (not .Values.datadog.orchestratorExplorer.useClusterCheckRunners) }}
{{- $useCRDConfig = false -}}
{{- end -}}
{{- end -}}

{{- $useCRDConfig -}}
{{- end -}}

{{- define "orchestratorExplorer-config" -}}
{{- if eq (include "orchestratorExplorer-add-custom-orchestrator-explorer-config" .) "true" -}}
orchestrator.yaml: |-
{{- if .Values.datadog.orchestratorExplorer.useClusterCheckRunners }}
  cluster_check: true
{{- end }}
  ad_identifiers:
    - _kube_orchestrator
  init_config:
  instances:
    - 
{{- if .Values.datadog.orchestratorExplorer.useClusterCheckRunners }}
      skip_leader_election: true
{{- end }}
{{- if gt (len (include "orchestratorExplorer-custom-resources" . | fromYamlArray)) 0 }}
      crd_collectors:
      {{- (include "orchestratorExplorer-custom-resources" .) | nindent 8 -}}
{{- end }}
{{- end }}
{{- end -}}
