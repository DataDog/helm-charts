apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agents-install-info-configmap-name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "datadog.labels" . | indent 4 }}
  annotations:
    checksum/install_info: {{ printf "%s-%s" .Chart.Name .Chart.Version | sha256sum }}
data:
  install_info: |
    ---
    install_method:
      tool: {{ .Values.datadog.installInfo.tool | default "helm" }}
      tool_version: {{ .Values.datadog.installInfo.toolVersion | default .Release.Service }}
      installer_version: {{ .Chart.Name }}-{{ .Chart.Version }}
