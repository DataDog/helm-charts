{{- if .Values.installAgents }}
{{- if and .Values.serviceAccount.create .Values.rbac.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "datadog-operator.agentInstallFullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "datadog-operator.labels" . | indent 4 }}
{{- end }}
{{- if .Values.rbac.create }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "datadog-operator.agentInstallFullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "datadog-operator.labels" . | indent 4 }}
rules:
  - apiGroups: ["datadoghq.com"]
    resources: ["datadogagents"]
    verbs: ["get", "list", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "datadog-operator.agentInstallFullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "datadog-operator.labels" . | indent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "datadog-operator.agentInstallFullname" . }}
subjects:
  - kind: ServiceAccount
    {{- if .Values.serviceAccount.create }}
    name: {{ include "datadog-operator.agentInstallFullname" . }}
    {{- else }}
    name: {{ include "datadog-operator.serviceAccountName" . }}
    {{- end }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
