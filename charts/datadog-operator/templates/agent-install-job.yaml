{{- if .Values.installAgents }}
{{- $defaultUrl := "https://raw.githubusercontent.com/DataDog/integrations-management/main/eks-addon/default-datadog-agent.yaml" }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "datadog-operator.fullname" . }}-agent-install
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "datadog-operator.labels" . | indent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "datadog-operator.name" . }}-agent-install
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "datadog-operator.fullname" . }}-agent-install
      restartPolicy: OnFailure
      containers:
        - name: agent-install
          image: "{{ .Values.agentInstallJob.image.repository }}:{{ .Values.agentInstallJob.image.tag }}"
          imagePullPolicy: {{ .Values.agentInstallJob.image.pullPolicy }}
          env:
            - name: AGENT_CONFIG_URL
              value: {{ .Values.agentConfigUrl | default $defaultUrl | quote }}
            - name: API_SECRET_NAME
              value: {{ include "datadog-operator.apiKeySecretName" . | quote }}
            {{- if eq (include "should-set-dd-app-key" .) "true" }}
            - name: APP_SECRET_NAME
              value: {{ include "datadog-operator.appKeySecretName" . | quote }}
            {{- end }}
            - name: NAMESPACE
              value: {{ .Release.Namespace | quote }}
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Downloading agent config from $AGENT_CONFIG_URL..."
              if command -v curl >/dev/null 2>&1; then
                curl -fsSL "$AGENT_CONFIG_URL" -o /tmp/agent-config.yaml
              elif command -v wget >/dev/null 2>&1; then
                wget -q -O /tmp/agent-config.yaml "$AGENT_CONFIG_URL"
              else
                echo "Error: neither curl nor wget found"
                exit 1
              fi
              echo "Substituting placeholder values..."
              sed -i "s/__DD_API_SECRET_NAME__/$API_SECRET_NAME/g" /tmp/agent-config.yaml
              sed -i "s/__DD_NAMESPACE__/$NAMESPACE/g" /tmp/agent-config.yaml
              if [ -n "${APP_SECRET_NAME:-}" ]; then
                sed -i "s/__DD_APP_SECRET_NAME__/$APP_SECRET_NAME/g" /tmp/agent-config.yaml
              else
                echo "No app key configured, removing placeholder references..."
                sed -i '/__DD_APP_SECRET_NAME__/d' /tmp/agent-config.yaml
              fi
              echo "Applying agent configuration..."
              kubectl apply -f /tmp/agent-config.yaml -n "$NAMESPACE"
              echo "Agent configuration applied successfully."
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
