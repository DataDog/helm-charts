{{- if .Values.installAgents }}
{{- if ne (include "should-set-dd-api-key" .) "true" -}}
  {{- fail "installAgents is true but no API key source is configured. Set apiKey, apiKeyExistingSecret, or provide an endpoint-config ConfigMap with api-key-secret-name." -}}
{{- end -}}
{{- if not .Values.datadogAgent.enabled -}}
  {{- fail "installAgents is true but datadogAgent.enabled is false. The operator will not reconcile the DatadogAgent resource. Set datadogAgent.enabled=true or disable installAgents." -}}
{{- end -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ printf "%s-%d" (include "datadog-operator.agentInstallFullname" .) .Release.Revision | trunc 63 | trimSuffix "-" }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "datadog-operator.labels" . | indent 4 }}
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "datadog-operator.agentInstallName" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
    {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
    {{- end }}
      {{- if and .Values.serviceAccount.create .Values.rbac.create }}
      serviceAccountName: {{ include "datadog-operator.agentInstallFullname" . }}
      {{- else }}
      serviceAccountName: {{ include "datadog-operator.serviceAccountName" . }}
      {{- end }}
      restartPolicy: OnFailure
      containers:
        - name: agent-install
          image: "{{ .Values.agentInstallJob.image.repository }}:{{ .Values.agentInstallJob.image.tag }}"
          imagePullPolicy: {{ .Values.agentInstallJob.image.pullPolicy }}
          env:
            - name: API_SECRET_NAME
              value: {{ include "datadog-operator.apiKeySecretName" . | quote }}
            {{- if eq (include "should-set-dd-app-key" .) "true" }}
            - name: APP_SECRET_NAME
              value: {{ include "datadog-operator.appKeySecretName" . | quote }}
            {{- end }}
            - name: NAMESPACE
              value: {{ include "datadog-operator.agentInstallNamespace" . | quote }}
          volumeMounts:
            - name: agent-config
              mountPath: /etc/agent-config
              readOnly: true
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Waiting for RBAC permissions to propagate..."
              retries=0
              until kubectl auth can-i create datadogagents.datadoghq.com -n "$NAMESPACE" 2>/dev/null; do
                retries=$((retries + 1))
                if [ "$retries" -ge 30 ]; then
                  echo "Error: timed out waiting for RBAC permissions"
                  exit 1
                fi
                sleep 2
              done
              echo "Using bundled agent configuration..."
              cp /etc/agent-config/agent-config.yaml /tmp/agent-config.yaml
              echo "Substituting placeholder values..."
              sed -i "s/__DD_API_SECRET_NAME__/$API_SECRET_NAME/g" /tmp/agent-config.yaml
              sed -i "s/__DD_NAMESPACE__/$NAMESPACE/g" /tmp/agent-config.yaml
              if [ -n "${APP_SECRET_NAME:-}" ]; then
                sed -i "s/__DD_APP_SECRET_NAME__/$APP_SECRET_NAME/g" /tmp/agent-config.yaml
              else
                echo "No app key configured, removing placeholder appSecret stanza..."
                awk '
                  /^[ \t]*appSecret:/ {
                    match($0,/^[ \t]*/); n=RLENGTH; buf=$0 ORS; next
                  }
                  buf!="" {
                    if(/^[ \t]*$/){ buf=buf $0 ORS; next }
                    match($0,/^[ \t]*/);
                    if(RLENGTH>n){ buf=buf $0 ORS; next }
                    if(buf !~ /__DD_APP_SECRET_NAME__/) printf "%s",buf;
                    buf=""; n=-1
                  }
                  { print }
                  END { if(buf!="" && buf !~ /__DD_APP_SECRET_NAME__/) printf "%s",buf }
                ' /tmp/agent-config.yaml > /tmp/agent-config.tmp && mv /tmp/agent-config.tmp /tmp/agent-config.yaml
              fi
              echo "Applying agent configuration..."
              kubectl apply -f /tmp/agent-config.yaml -n "$NAMESPACE"
              echo "Agent configuration applied successfully."
      volumes:
        - name: agent-config
          configMap:
            name: {{ include "datadog-operator.agentInstallFullname" . }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
