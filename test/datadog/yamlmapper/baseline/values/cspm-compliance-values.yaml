# Test values enabling CSPM (Cloud Security Posture Management / compliance), which adds the
# security-agent container to the node Agent and surfaces compliance_config.* in `agent config`.
datadog:
  apiKey: "00000000000000000000000000000000"
  appKey: "0000000000000000000000000000000000000000"
  site: datadoghq.com
  clusterName: cspm-compliance-cluster
  kubelet:
    tlsVerify: false

  securityAgent:
    compliance:
      enabled: true
      host_benchmarks:
        enabled: true

agents:
  image:
    tag: 7.75.0

clusterAgent:
  image:
    tag: 7.75.0
  enabled: true
