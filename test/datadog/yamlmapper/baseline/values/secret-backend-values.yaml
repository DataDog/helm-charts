# Test values configuring the secret backend, which surfaces on the node Agent as
# secret_backend.command / secret_backend.timeout in `agent config --all`.
# Uses the readsecret helper shipped in the agent image so the command is valid.
datadog:
  apiKey: "00000000000000000000000000000000"
  appKey: "0000000000000000000000000000000000000000"
  site: datadoghq.com
  clusterName: secret-backend-cluster
  kubelet:
    tlsVerify: false

  secretBackend:
    command: "/readsecret_multiple_providers.sh"
    timeout: 30

agents:
  image:
    tag: 7.75.0

clusterAgent:
  image:
    tag: 7.75.0
  enabled: true
