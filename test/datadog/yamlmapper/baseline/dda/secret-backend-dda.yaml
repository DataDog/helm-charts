apiVersion: datadoghq.com/v2alpha1
kind: DatadogAgent
metadata:
  name: datadog
spec:
  global:
    clusterName: secret-backend-cluster
    credentials:
      apiKey: "00000000000000000000000000000000"
      appKey: "0000000000000000000000000000000000000000"
    kubelet:
      tlsVerify: false
    secretBackend:
      command: /readsecret_multiple_providers.sh
      timeout: 30
    site: datadoghq.com
  override:
    clusterAgent:
      image:
        tag: 7.75.0
    nodeAgent:
      image:
        tag: 7.75.0
