apiVersion: datadoghq.com/v2alpha1
kind: DatadogAgent
metadata:
  name: datadog
spec:
  features:
    dataPlane:
      dogstatsd:
        enabled: true
      enabled: true
  global:
    clusterName: agent-data-plane-cluster
    credentials:
      apiKey: "00000000000000000000000000000000"
      appKey: "0000000000000000000000000000000000000000"
    kubelet:
      tlsVerify: false
    site: datadoghq.com
  override:
    clusterAgent:
      image:
        tag: 7.75.0
    nodeAgent:
      image:
        tag: 7.75.0
