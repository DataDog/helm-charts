# Baseline test for GKE Autopilot WorkloadAllowlist with OTel collector feature gates.
datadog:
  apiKeyExistingSecret: datadog-secret
  appKeyExistingSecret: datadog-secret
  envDict:
    HELM_FORCE_RENDER: true  # workaround to force helm template rendering of GKE Autopilot WorkloadAllowlist-enabled resources
  otelCollector:
    enabled: true
    featureGates: "gate1,-gate2,+gate3"

clusterAgent:
  enabled: true

clusterChecksRunner:
  enabled: true

providers:
  gke:
    autopilot: true
