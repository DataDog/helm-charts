name: Labeler
on:
  pull_request:
    branches:
      - main

# Permission forced by repo-level setting; only elevate on job-level
permissions:
  contents: read
  # packages: read

jobs:
  label:
    name: Add label for PRs
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    timeout-minutes: 5
    steps:
      - uses: actions/labeler@bf12e9b00b37c5c0ca2b87b79b2daf7891dbda13 # v7
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          configuration-path: .github/workflows/labeler/labels.yaml
