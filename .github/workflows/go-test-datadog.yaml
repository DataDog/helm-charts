name: Go Test Datadog
on:
  push:
    paths:
      - 'test/datadog/**'
      - 'charts/datadog/requirements.*'
      - 'charts/datadog/values.*'
      - 'charts/datadog/templates/**'
      - 'charts/datadog/files/**'
  pull_request:
    paths:
      - 'test/datadog/**'
      - 'charts/datadog/requirements.*'
      - 'charts/datadog/values.*'
      - 'charts/datadog/templates/**'
      - 'charts/datadog/files/**'

# Permission forced by repo-level setting; only elevate on job-level
permissions:
  contents: read
  # packages: read

env:
  GO111MODULE: "on"
  PROJECTNAME: "helm-charts"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.26
        id: go
      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.17.2
      - name: Add Datadog Helm repo
        run: helm repo add datadog https://helm.datadoghq.com && helm repo update
      - name: Add Prometheus Community Helm repo
        run: helm repo add prometheus-community https://prometheus-community.github.io/helm-charts && helm repo update
      - name: Check out code into the Go module directory
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: run Go tests
        run: |
          helm dependency build ./charts/datadog
          make unit-test-datadog
      - name: Notify on go-test-datadog failure
        if: failure()
        run: echo "::error::Datadog Go tests failed. Check the 'run Go tests' step. If baselines are out of date, run 'make update-test-baselines-datadog-agent' and commit."
