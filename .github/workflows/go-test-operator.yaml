name: Go Test
on:
  push:
    paths:
      - 'test/datadog-operator/**'
      - 'charts/datadog-operator/**'
      - 'test/integ/**'
  pull_request:
    paths:
      - 'test/datadog-operator/**'
      - 'charts/datadog-operator/**'
      - 'test/integ/**'

# Permission forced by repo-level setting; only elevate on job-level
permissions:
  contents: read
  # packages: read

env:
  GO111MODULE: "on"
  PROJECTNAME: "helm-charts"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: 1.26
      id: go
    - name: Set up Helm
      uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
      with:
        version: v3.17.2
    - name: Add Datadog Helm repo
      run: helm repo add datadog https://helm.datadoghq.com && helm repo update
    - name: Check out code into the Go module directory
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: run Go tests
      run: |
        helm dependency build ./charts/datadog-operator
        make unit-test-operator

  integ-tests:
    if: ${{github.event.pull_request.head.repo.full_name == github.repository }}
    name: integ-tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        versions:
          - k8s: v1.22.17
            kind: v0.22.0
          - k8s: v1.24.17
            kind: v0.22.0
          - k8s: v1.25.16
            kind: v0.22.0
          - k8s: v1.26.15
            kind: v0.22.0
          - k8s: v1.27.16
            kind: v0.22.0
          - k8s: v1.28.13
            kind: v0.22.0
          - k8s: v1.29.8
            kind: v0.22.0
          - k8s: v1.30.13
            kind: v0.22.0
          - k8s: v1.31.9
            kind: v0.22.0
          - k8s: v1.32.5
            kind: v0.22.0
          - k8s: v1.33.1
            kind: v0.22.0
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Create K8s ${{ matrix.versions.k8s }} cluster with kind version ${{ matrix.versions.kind }}
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          version: ${{ matrix.versions.kind }}
          node_image: kindest/node:${{ matrix.versions.k8s }}
          cluster_name: operator-ci-${{ matrix.versions.k8s }}
          config: .github/kind_config.yaml
      - name: Add Cert Manager Helm repo
        run: helm repo add jetstack https://charts.jetstack.io && helm repo update
      - name: Add Datadog Helm repo
        run: helm repo add datadog https://helm.datadoghq.com && helm repo update
      - name: Run integ tests
        env:
          CLUSTER_NAME: operator-ci-${{ matrix.versions.k8s }}
          K8S_VERSION: ${{ matrix.versions.k8s }}
        run: |
          kubectl cluster-info
          kubectl get nodes
          helm dependency build ./charts/datadog-operator
          make integration-test
