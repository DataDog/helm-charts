# Default DatadogAgent configuration for EKS add-on automatic agent installation.
#
# This file is intended to be published to the integrations-management repository at:
#   https://github.com/DataDog/integrations-management/blob/main/eks-addon/default-datadog-agent.yaml
#
# Placeholder substitution is performed by the agent-install Job:
#   __DD_API_SECRET_NAME__  - Kubernetes Secret name containing the Datadog API key
#   __DD_APP_SECRET_NAME__  - Kubernetes Secret name containing the Datadog App key
#   __DD_NAMESPACE__        - Target namespace for the DatadogAgent resource
apiVersion: datadoghq.com/v2alpha1
kind: DatadogAgent
metadata:
  name: datadog-agent
spec:
  global:
    credentials:
      apiSecret:
        secretName: __DD_API_SECRET_NAME__
        keyName: api-key
      appSecret:
        secretName: __DD_APP_SECRET_NAME__
        keyName: app-key
  features:
    liveContainerCollection:
      enabled: true
    liveProcessCollection:
      enabled: true
    logCollection:
      enabled: true
      containerCollectAll: true
    apm:
      enabled: true
    npm:
      enabled: true
