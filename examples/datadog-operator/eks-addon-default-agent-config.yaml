# Default DatadogAgent configuration for EKS add-on automatic agent installation.
#
# This is the reference copy of the config bundled in the chart's
# agent-default-config.yaml ConfigMap template. Placeholder substitution
# is performed by the agent-install Job:
#   __DD_API_SECRET_NAME__  - Kubernetes Secret name containing the Datadog API key
#   __DD_APP_SECRET_NAME__  - Kubernetes Secret name containing the Datadog App key
apiVersion: datadoghq.com/v2alpha1
kind: DatadogAgent
metadata:
  name: datadog-agent
spec:
  global:
    credentials:
      apiSecret:
        secretName: __DD_API_SECRET_NAME__
        keyName: api-key
      appSecret:
        secretName: __DD_APP_SECRET_NAME__
        keyName: app-key
  features:
    liveContainerCollection:
      enabled: true
    liveProcessCollection:
      enabled: true
    logCollection:
      enabled: true
      containerCollectAll: true
    apm:
      enabled: true
    npm:
      enabled: true
